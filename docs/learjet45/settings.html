<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Learjet 45 – Settings</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/settings.js" defer></script>

    <style>
        body {
            background: #0d1117;
            color: white;
            font-family: Arial, sans-serif;
            padding: 25px;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
        }

        h3 {
            text-align: center;
            color: #9ba3b4;
            margin-top: 0;
        }

        .nav {
            text-align: center;
            margin-bottom: 25px;
        }

        .nav a {
            color: #58a6ff;
            margin: 0 12px;
            text-decoration: none;
            font-size: 18px;
        }

        .nav a:hover {
            text-decoration: underline;
        }

        .settings-container {
            max-width: 700px;
            margin: auto;
            background: #161b22;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #30363d;
        }

        label {
            display: block;
            margin-top: 15px;
            font-size: 16px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 6px;
            border: 1px solid #30363d;
            background: #0d1117;
            color: white;
        }

        .save-btn {
            margin-top: 25px;
            width: 100%;
            padding: 14px;
            background: #238636;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
        }

        .save-btn:hover {
            background: #2ea043;
        }

        .saved-msg {
            margin-top: 15px;
            text-align: center;
            color: #58a6ff;
            display: none;
        }
    </style>
</head>
<body>

    <h1>Learjet 45</h1>
    <h3>Aircraft Settings</h3>

    <div class="nav">
        <a href="index.html">Home</a>
        <a href="wb.html">Weight & Balance</a>
        <a href="perf.html">Performance</a>
        <a href="specs.html">Specs</a>
    </div>

    <div class="settings-container">

        <label>Fuel Density (lbs/gal)</label>
        <input type="number" id="fuelDensity" placeholder="Default: 6.7">

        <label>Taxi Fuel (lbs)</label>
        <input type="number" id="taxiFuel" placeholder="Default: 200">

        <label>Max Takeoff Weight (lbs)</label>
        <input type="number" id="maxTOW" placeholder="Default: 21500">

        <label>Max Landing Weight (lbs)</label>
        <input type="number" id="maxLW" placeholder="Default: 19200">

        <label>Default Crew Weight (lbs)</label>
        <input type="number" id="defaultCrew" placeholder="Optional">

        <label>Default Passenger Weight (lbs)</label>
        <input type="number" id="defaultPassenger" placeholder="Optional">

        <button class="save-btn" onclick="saveLJ45Settings()">Save Settings</button>

        <p class="saved-msg" id="savedMsg">Settings saved!</p>

    </div>

</body>
</html>
