<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LJ45 – Weight & Balance</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div class="navbar">
        <button class="nav-back" onclick="goBack()">← Back</button>
        <div class="navbar-title">Weight & Balance</div>
        <button class="nav-settings" onclick="openSettings()">⚙</button>
    </div>

    <div class="page-header">
        <h1>Weight & Balance</h1>
    </div>

    <div class="card">

        <label>Crew Weight (lbs)</label>
        <input id="frontCrew" type="number">

        <label>Passenger Weight (lbs)</label>
        <input id="passengers" type="number">

        <label>Aft Baggage (lbs)</label>
        <input id="aftBaggage" type="number">

        <label>Fuel Onboard (lbs)</label>
        <input id="fuelLbs" type="number">

        <label>Fuel Burn (lbs)</label>
        <input id="fuelBurnLbs" type="number">

        <label>Taxi Fuel (lbs)</label>
        <input id="taxiFuel" type="number">

        <label>Reserve Fuel (lbs)</label>
        <input id="reserveFuel" type="number">

        <div id="ljResults" class="result-box">Enter values to calculate.</div>
        <div id="safeStatus" class="result-box"></div>

    </div>

    <script src="../js/core.js"></script>
    <script src="../js/settings.js"></script>
    <script src="../js/wb.js"></script>
</body>
</html>
