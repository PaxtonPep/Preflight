<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Learjet 45 – Weight & Balance</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div class="navbar">
        <div class="navbar-title">Learjet 45 – Weight & Balance</div>
        <a href="../index.html">Change Aircraft</a>
    </div>

    <div class="page-header">
        <h1>Weight & Balance</h1>
        <h3>Load the aircraft and check if it's safe to fly</h3>
    </div>

    <div class="card">

        <label>Crew Weight (lbs)</label>
        <input type="number" id="frontCrew" placeholder="e.g. 380">

        <label>Passenger Weight (lbs)</label>
        <input type="number" id="passengers" placeholder="e.g. 900">

        <label>Aft Baggage (lbs)</label>
        <input type="number" id="aftBaggage" placeholder="e.g. 200">

        <label>Fuel Onboard (lbs)</label>
        <input type="number" id="fuelLbs" placeholder="e.g. 3000">

        <label>Planned Fuel Burn (lbs)</label>
        <input type="number" id="fuelBurnLbs" placeholder="e.g. 1200">

        <label>Taxi Fuel (lbs, optional)</label>
        <input type="number" id="taxiFuel" placeholder="Optional">

        <label>Reserve Fuel (lbs, optional)</label>
        <input type="number" id="reserveFuel" placeholder="Optional">

        <div class="result-box" id="ljResults">
            <p>Enter values to calculate weight & balance.</p>
        </div>

        <div class="result-box" id="safeStatus">
            <p class="safe-status-text">Safe to fly status will appear here.</p>
        </div>

    </div>

    <script src="../js/core.js"></script>
    <script src="../js/wb.js"></script>
</body>
</html>
