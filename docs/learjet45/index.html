<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aircraft Selection</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: #0d1117;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 40px;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 30px;
        }

        .aircraft-grid {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 40px;
        }

        .aircraft-card {
            background: #161b22;
            padding: 25px;
            border-radius: 12px;
            width: 250px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #30363d;
        }

        .aircraft-card:hover {
            background: #1f2630;
            transform: scale(1.03);
        }

        .aircraft-card img {
            width: 100%;
            margin-bottom: 15px;
        }

        .aircraft-card h2 {
            margin: 0;
            font-size: 22px;
        }
    </style>
</head>
<body>

    <h1>Select Your Aircraft</h1>

    <div class="aircraft-grid">

        <a href="cessna172/index.html" class="aircraft-card">
            <img src="CofG/Assets/cessna172outline.png" alt="Cessna 172">
            <h2>Cessna 172</h2>
        </a>

        <a href="learjet45/index.html" class="aircraft-card">
            <img src="CofG/Assets/learjet45outline.png" alt="Learjet 45">
            <h2>Learjet 45</h2>
        </a>

    </div>

</body>
</html>
