<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cessna 172 – Settings</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div class="navbar">
        <div class="navbar-title">Cessna 172 – Settings</div>
        <a href="../index.html">Change Aircraft</a>
    </div>

    <div class="page-header">
        <h1>Aircraft Settings</h1>
        <h3>Edit all performance and spec values</h3>
    </div>

    <div class="card">

        <h2>Weights & Fuel</h2>
        <label>Fuel Density (lbs/gal)</label>
        <input type="number" id="setFuelDensity" placeholder="Default: 6.0">

        <label>Max Takeoff Weight (lbs)</label>
        <input type="number" id="setMaxTOW" placeholder="Default: 2550">

        <label>Empty Weight (lbs)</label>
        <input type="number" id="setEmptyWeight" placeholder="Default: 1660">

        <label>Fuel Capacity (gal)</label>
        <input type="number" id="setFuelCapacity" placeholder="Default: 56">

        <label>Baggage Capacity (lbs)</label>
        <input type="number" id="setBaggageCapacity" placeholder="Default: 120">

        <h2>Capacity</h2>
        <label>Crew Count</label>
        <input type="number" id="setCrew" placeholder="Default: 1">

        <label>Passenger Capacity</label>
        <input type="number" id="setPassengers" placeholder="Default: 3">

        <label>Total Seats</label>
        <input type="number" id="setTotalSeats" placeholder="Default: 4">

        <h2>Performance</h2>
        <label>Cruise Speed (KTAS)</label>
        <input type="number" id="setCruise" placeholder="Default: 122">

        <label>Range (NM)</label>
        <input type="number" id="setRange" placeholder="Default: 640">

        <label>Service Ceiling (ft)</label>
        <input type="number" id="setCeiling" placeholder="Default: 14000">

        <h2>V‑Speeds</h2>
        <label>Vr (KIAS)</label>
        <input type="number" id="setVr" placeholder="Default: 55">

        <label>Vx (KIAS)</label>
        <input type="number" id="setVx" placeholder="Default: 62">

        <label>Vy (KIAS)</label>
        <input type="number" id="setVy" placeholder="Default: 74">

        <label>Vfe (KIAS)</label>
        <input type="number" id="setVfe" placeholder="Default: 110">

        <label>Vne (KIAS)</label>
        <input type="number" id="setVne" placeholder="Default: 163">

        <div style="margin-top:24px; display:flex; gap:12px; flex-wrap:wrap;">
            <button class="button" id="saveC172SettingsBtn" type="button">Save Settings</button>
            <button class="button" id="resetC172SettingsBtn" type="button" style="background:#e74c3c;">Reset to Defaults</button>
        </div>

        <div class="result-box" id="settingsStatus" style="margin-top:16px;">
            <p>Status messages will appear here.</p>
        </div>

    </div>
<script src="../js/core.js"></script>
<script src="../js/settings.js"></script>
</body>
</html>
