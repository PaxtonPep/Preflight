<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>C172 – Performance</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div class="navbar">
        <button class="nav-back" onclick="goBack()">← Back</button>
        <div class="navbar-title">Performance</div>
        <button class="nav-settings" onclick="openSettings()">⚙</button>
    </div>

    <div class="page-header">
        <h1>Performance Calculator</h1>
    </div>

    <div class="card">
        <label>Pressure Altitude</label>
        <input id="pressureAlt" type="number">

        <label>OAT (°C)</label>
        <input id="oat" type="number">

        <label>IAS (kts)</label>
        <input id="ias" type="number">

        <label>Fuel Burn (gal/hr)</label>
        <input id="fuelBurn" type="number">

        <label>Flight Time (hr)</label>
        <input id="flightTime" type="number">

        <div id="perfResults" class="result-box">Enter values to calculate.</div>
    </div>

    <script src="../js/core.js"></script>
    <script src="../js/settings.js"></script>
    <script src="../js/perf.js"></script>
</body>
</html>
