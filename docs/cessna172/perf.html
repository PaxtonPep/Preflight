<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cessna 172 – Performance</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div class="navbar">
        <div class="navbar-title">Cessna 172 – Performance</div>
        <a href="../index.html">Change Aircraft</a>
    </div>

    <div class="page-header">
        <h1>Performance Calculator</h1>
        <h3>Plan cruise, fuel, and range</h3>
    </div>

    <div class="card">

        <label>Pressure Altitude (ft)</label>
        <input type="number" id="pressureAlt" placeholder="e.g. 6000">

        <label>OAT (°C)</label>
        <input type="number" id="oat" placeholder="e.g. 5">

        <label>Indicated Airspeed (KIAS)</label>
        <input type="number" id="ias" placeholder="e.g. 105">

        <label>Fuel Burn (gal/hr)</label>
        <input type="number" id="fuelBurn" placeholder="e.g. 9.5">

        <label>Flight Planning Mode</label>
        <select id="flightMode">
            <option value="time">Plan by Flight Time</option>
            <option value="distance">Plan by Distance</option>
            <option value="block">Plan by Block Time</option>
        </select>

        <label id="flightTimeLabel">Flight Time (hours)</label>
        <input type="number" id="flightTime" placeholder="e.g. 2.3">

        <label id="distanceLabel" style="display:none;">Planned Distance (NM)</label>
        <input type="number" id="distance" placeholder="e.g. 240" style="display:none;">

        <label id="blockTimeLabel" style="display:none;">Block Time (hours)</label>
        <input type="number" id="blockTime" placeholder="Gate‑to‑gate" style="display:none;">

        <div class="result-box" id="perfResults">
            <p>Enter values to calculate performance.</p>
        </div>

    </div>
<script src="../js/core.js"></script>
<script src="../js/perf.js"></script>
</body>
</html>
