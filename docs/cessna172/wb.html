<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>C172 – Weight & Balance</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div class="navbar">
        <button class="nav-back" onclick="goBack()">← Back</button>
        <div class="navbar-title">Weight & Balance</div>
        <button class="nav-settings" onclick="openSettings()">⚙</button>
    </div>

    <div class="page-header">
        <h1>Weight & Balance</h1>
    </div>

    <div class="card">
        <label>Front Seats (lbs)</label>
        <input id="frontSeats" type="number">

        <label>Rear Seats (lbs)</label>
        <input id="rearSeats" type="number">

        <label>Baggage (lbs)</label>
        <input id="baggage" type="number">

        <label>Fuel (gal)</label>
        <input id="fuel" type="number">

        <label>Fuel Burn (gal)</label>
        <input id="fuelBurn" type="number">

        <label>Taxi Fuel (gal)</label>
        <input id="taxiFuel" type="number">

        <label>Reserve Fuel (gal)</label>
        <input id="reserveFuel" type="number">

        <div id="results" class="result-box">Enter values to calculate.</div>
        <div id="safeStatus" class="result-box"></div>
    </div>

    <script src="../js/core.js"></script>
    <script src="../js/settings.js"></script>
    <script src="../js/wb.js"></script>
</body>
</html>
