<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cessna 172 – Weight & Balance</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div class="navbar">
        <div class="navbar-title">Cessna 172 – Weight & Balance</div>
        <a href="../index.html">Change Aircraft</a>
    </div>

    <div class="page-header">
        <h1>Weight & Balance</h1>
        <h3>Load the aircraft and check if it's safe to fly</h3>
    </div>

    <div class="card">

        <label>Pilot & Front Passenger (lbs)</label>
        <input type="number" id="frontSeats" placeholder="e.g. 340">

        <label>Rear Passengers (lbs)</label>
        <input type="number" id="rearSeats" placeholder="e.g. 320">

        <label>Baggage Area (lbs)</label>
        <input type="number" id="baggage" placeholder="e.g. 80">

        <label>Fuel Onboard (gallons)</label>
        <input type="number" id="fuel" placeholder="e.g. 40">

        <label>Planned Fuel Burn (gallons)</label>
        <input type="number" id="fuelBurn" placeholder="e.g. 12">

        <label>Taxi Fuel (gallons, optional)</label>
        <input type="number" id="taxiFuel" placeholder="Optional">

        <label>Reserve Fuel (gallons, optional)</label>
        <input type="number" id="reserveFuel" placeholder="Optional">

        <label>Taxi Speed (kts, optional)</label>
        <input type="number" id="taxiSpeed" placeholder="Optional">

        <div class="result-box" id="results">
            <p>Enter values to calculate weight & balance.</p>
        </div>

        <div class="result-box" id="safeStatus">
            <p class="safe-status-text">Safe to fly status will appear here.</p>
        </div>

    </div>

</body>
</html>
